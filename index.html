<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fjalëkryq – Fizikë</title>
<style>
  body {
    margin: 0;
    padding: 2rem 1rem;
    background: #f5f0e8;
    color: #1a1a2e;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 3rem;
    margin: 0;
    color: #1a1a2e;
  }

  header h1 span {
    color: #c0392b;
  }

  header p {
    font-size: 0.9rem;
    margin: 0.5rem 0;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .red-line {
    width: 60px;
    height: 4px;
    background: #c0392b;
    margin: 0.8rem auto;
  }

  iframe {
    border: 3px solid #1a1a2e;
    margin: 2rem auto;
    display: block;
    max-width: 100%;
  }

  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  @media (max-width: 700px) {
    header h1 {
      font-size: 2rem;
    }
    
    iframe {
      width: 100% !important;
      height: auto !important;
    }
  }
</style>
</head>
<body>

<header>
  <p>Klasa e Fizikës</p>
  <h1>Fjalë<span>kryq</span></h1>
  <div class="red-line"></div>
  <p>Plotëso fjalëkryqin</p>
</header>

<iframe width="600" height="600" style="border:3px solid #1a1a2e; margin:auto; display:block" frameborder="0" src="https://crosswordlabs.com/embed/bote-fizike"></iframe>

</body>
</html>
